<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eight Eight Studio — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      height: 100vh;
      background: radial-gradient(circle at 20% 20%, #1a1a1a, #000);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      overflow: hidden;
    }

    .glass-card {
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      background: rgba(255,255,255,0.08);
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,0.15);
      padding: 60px 50px;
      width: 90%;
      max-width: 820px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    .logo {
      width: 120px;
      margin-bottom: 30px;
      filter: drop-shadow(0 10px 25px rgba(255,255,255,0.15));
    }

    h1 {
      font-weight: 600;
      font-size: 2.4rem;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .sub {
      opacity: 0.75;
      margin-bottom: 25px;
    }

    .coming {
      font-size: 1.1rem;
      margin-bottom: 35px;
      color: #d1d1d1;
      letter-spacing: 2px;
    }

    .socials {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 35px;
    }

    .socials a {
      text-decoration: none;
      color: white;
      padding: 10px 18px;
      border-radius: 14px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      transition: all 0.3s ease;
    }

    .socials a:hover {
      background: rgba(255,255,255,0.2);
      transform: translateY(-3px);
    }

    footer {
      font-size: 0.8rem;
      opacity: 0.5;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="glass-card">
    <img src="Logo-88.jpg" alt="Eight Eight Studio Logo" class="logo" />
    <h1>Eight Eight Studio</h1>
    <p class="sub">Our webpage is under development.</p>
    <div class="coming">COMING SOON</div>

    <div class="socials">
      <a href="https://www.instagram.com/eighteightagency/" target="_blank">Instagram</a>
      <a href="https://www.facebook.com/profile.php?id=61587175742097" target="_blank">Facebook</a>
      <a href="https://www.linkedin.com/company/eighteightstudio" target="_blank">LinkedIn</a>
    </div>

    <footer>© 2026 Eight Eight Studio. All Rights Reserved.</footer>
  </div>
</body>
</html>
